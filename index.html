<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeetCode Hot 100 刷题进度</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --panel: #ffffff;
      --ink: #20232a;
      --muted: #6c7280;
      --line: #dde1e7;
      --accent: #0f8b8d;
      --accent-2: #ef8354;
      --done: #2f855a;
      --shadow: 0 12px 34px rgba(32, 35, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 245, 239, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .top {
      max-width: 1240px;
      margin: 0 auto;
      padding: 18px 18px 14px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .stats {
      min-width: 260px;
      text-align: right;
    }

    .big-stat {
      font-size: 34px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .bar {
      height: 10px;
      margin-top: 8px;
      border-radius: 999px;
      background: #e7e9ed;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 180ms ease;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
    }

    input[type="search"], select {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      font-size: 14px;
      outline: none;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover, input:focus, select:focus {
      border-color: var(--accent);
    }

    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px 18px 40px;
    }

    .category {
      margin-bottom: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .category h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .category-meta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 11px 10px;
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fbfcfd;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .order {
      width: 54px;
      color: var(--muted);
      text-align: center;
    }

    .problem {
      min-width: 270px;
    }

    .problem a {
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
    }

    .problem a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .number {
      color: var(--muted);
      font-weight: 700;
      margin-right: 8px;
    }

    .difficulty {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .easy { background: #e7f6ef; color: #217a4d; }
    .medium { background: #fff1dd; color: #a65e00; }
    .hard { background: #ffe7e7; color: #b4232a; }

    .checks {
      width: 560px;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(92px, 1fr));
      gap: 8px;
      align-items: center;
    }

    .date-cell {
      display: grid;
      gap: 4px;
    }

    .date-cell span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .date-picker-wrap {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
    }

    .date-display {
      width: 100%;
      min-height: 31px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 6px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
    }

    .date-display:hover,
    .date-display:focus {
      border-color: var(--accent);
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .date-display.done {
      border-color: #8bc6a6;
      background: #eaf7f0;
      color: var(--done);
    }

    .date-picker-wrap input[type="date"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
    }

    .clear-date {
      position: absolute;
      top: -6px;
      right: -6px;
      display: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      padding: 0;
      border-radius: 999px;
      border-color: #b9d8c8;
      background: #fff;
      color: var(--done);
      line-height: 1;
      font-size: 12px;
    }

    .date-picker-wrap.has-date .clear-date {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .note-input {
      width: 100%;
      border: 1px solid transparent;
      border-bottom-color: var(--line);
      padding: 7px 6px;
      outline: none;
      font-size: 13px;
      background: transparent;
    }

    .note-input:focus {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: #fff;
    }

    .hidden {
      display: none;
    }

    .empty {
      padding: 40px 12px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .review-panel {
      margin-bottom: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 5px solid var(--accent-2);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .review-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      background: #fffaf6;
      border-bottom: 1px solid var(--line);
    }

    .review-head h2 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .review-count {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-2);
      white-space: nowrap;
    }

    .review-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
      padding: 14px 18px 18px;
    }

    .plan-section {
      min-width: 0;
    }

    .plan-section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .plan-section .review-item + .review-item {
      margin-top: 8px;
    }

    .plan-button {
      width: 100%;
      margin-top: 8px;
      border-color: var(--accent-2);
      color: var(--accent-2);
      background: #fffaf6;
    }

    .review-item {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      text-decoration: none;
      background: #fff;
    }

    .review-item.primary {
      border-color: var(--accent-2);
      background: #fffaf6;
    }

    .review-item:hover {
      border-color: var(--accent);
    }

    .review-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .review-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .next-review {
      min-width: 96px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    tr.due-today {
      background: #fffaf1;
    }

    tr.plan-review {
      background: #fff2df;
    }

    tr.plan-new {
      background: #eef7ff;
    }

    dialog {
      width: min(920px, calc(100vw - 28px));
      max-height: min(760px, calc(100vh - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 24px 80px rgba(32, 35, 42, 0.22);
    }

    dialog::backdrop {
      background: rgba(32, 35, 42, 0.32);
    }

    .modal-head,
    .modal-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: #fbfcfd;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .modal-actions {
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .modal-tools {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-body {
      padding: 16px;
    }

    .danger-button {
      border-color: #d64545;
      background: #d64545;
      color: #fff;
    }

    .danger-button:hover {
      border-color: #b4232a;
      background: #b4232a;
    }

    .known-list {
      max-height: 440px;
      overflow: auto;
      padding: 10px 16px 16px;
    }

    .known-group {
      margin-bottom: 14px;
    }

    .known-group h3 {
      margin: 8px 0;
      font-size: 14px;
    }

    .known-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 8px;
    }

    .known-option {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      cursor: pointer;
    }

    .known-option:hover {
      border-color: var(--accent);
    }

    .known-option input {
      margin-top: 3px;
    }

    .known-option strong {
      display: block;
      font-size: 13px;
    }

    .known-option span {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .title-row {
        display: block;
      }

      .stats {
        min-width: 0;
        margin-top: 12px;
        text-align: left;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar input[type="search"] {
        grid-column: 1 / -1;
      }
    }

    @media print {
      header {
        position: static;
      }

      .toolbar, .note-input {
        display: none;
      }

      body {
        background: #fff;
      }

      .category {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div class="title-row">
        <div>
          <h1>LeetCode Hot 100 刷题进度</h1>
          <p class="subtitle">按推荐专题顺序排列；每题 5 个复习轮次，勾选和备注会自动保存在这个浏览器里。</p>
        </div>
        <div class="stats" aria-live="polite">
          <div class="big-stat" id="totalDone">0/500</div>
          <div class="subtitle" id="problemDone">已完成 0/100 题至少一遍</div>
          <div class="bar" aria-hidden="true"><span id="progressBar"></span></div>
        </div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="搜索题号、中文题名、英文题名或专题">
        <select id="categoryFilter" aria-label="专题筛选">
          <option value="all">全部专题</option>
        </select>
        <select id="statusFilter" aria-label="进度筛选">
          <option value="all">全部进度</option>
          <option value="not-started">还没开始</option>
          <option value="started">已开始</option>
          <option value="due-today">今日该复习</option>
          <option value="complete">五轮完成</option>
        </select>
        <button id="importKnownBtn" type="button">导入已有基础</button>
        <button id="exportProgressBtn" type="button">导出进度</button>
        <button id="importProgressBtn" type="button">导入进度</button>
        <button id="bindBackupBtn" type="button">绑定本地备份</button>
        <input id="progressFileInput" class="hidden" type="file" accept="application/json,.json">
        <button id="resetBtn" type="button">清空进度</button>
      </div>
    </div>
  </header>

  <main>
    <section id="reviewPanel" class="review-panel hidden" aria-live="polite">
      <div class="review-head">
        <div>
          <h2>今日复习</h2>
          <p class="subtitle">每日节奏：复习 1 道旧题，再做 2 到 3 道新题；新题明天先独立重做，之后按 4、10、21 天排队。</p>
        </div>
        <div class="review-count" id="reviewCount">今日计划</div>
      </div>
      <div class="review-list" id="reviewList"></div>
    </section>
    <div id="list"></div>
    <div id="empty" class="empty hidden">没有匹配的题目。</div>
  </main>

  <dialog id="knownDialog">
    <div class="modal-head">
      <div>
        <h2>选择已有基础题目</h2>
        <p class="subtitle">勾选你已经做过并复习过的 Hot 100 题，确认后会统一标记为前两轮完成。</p>
      </div>
      <button id="closeKnownBtn" type="button">关闭</button>
    </div>
    <div class="modal-tools">
      <input id="knownSearch" type="search" placeholder="搜索题号、题名或专题">
      <button id="selectVisibleBtn" type="button">全选当前</button>
      <button id="selectStartedBtn" type="button">选择已开始</button>
      <button id="clearSelectionBtn" type="button">清空选择</button>
    </div>
    <div id="knownList" class="known-list"></div>
    <div class="modal-actions">
      <span class="subtitle" id="knownSelectedCount">已选择 0 题</span>
      <button id="applyKnownBtn" type="button">标记为已做并复习</button>
    </div>
  </dialog>

  <dialog id="resetDialog">
    <div class="modal-head">
      <div>
        <h2>确认清空进度</h2>
        <p class="subtitle">这个操作会清空所有完成日期、备注和今日计划。</p>
      </div>
      <button id="closeResetBtn" type="button">关闭</button>
    </div>
    <div class="modal-body">
      <p class="subtitle">已导出的备份文件不会受影响。清空后如果需要恢复，可以用“导入进度”选择备份 JSON。</p>
    </div>
    <div class="modal-actions">
      <button id="cancelResetBtn" type="button">取消</button>
      <button id="confirmResetBtn" class="danger-button" type="button">确认清空</button>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "leetcode-hot100-progress-v1";
    const DAILY_PLAN_KEY = "leetcode-hot100-daily-plan-v1";
    const BACKUP_DB_NAME = "leetcode-hot100-backup-db";
    const BACKUP_STORE_NAME = "handles";

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateStats();
      scheduleAutoBackup();
    }

    function getRecord(id) {
      if (!state[id]) {
        state[id] = { rounds: Array(ROUNDS.length).fill(false), dates: Array(ROUNDS.length).fill(""), note: "" };
      }
      if (!Array.isArray(state[id].rounds)) {
        state[id].rounds = Array(ROUNDS.length).fill(false);
      }
      if (!Array.isArray(state[id].dates)) {
        state[id].dates = Array(ROUNDS.length).fill("");
      }
      while (state[id].rounds.length < ROUNDS.length) state[id].rounds.push(false);
      while (state[id].dates.length < ROUNDS.length) state[id].dates.push("");
      state[id].rounds.forEach((done, index) => {
        if (done && !state[id].dates[index]) state[id].dates[index] = todayISO();
        if (!done && state[id].dates[index]) state[id].dates[index] = "";
      });
      return state[id];
    }

    function todayISO() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseISODate(value) {
      const [year, month, day] = String(value).split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function addDays(value, days) {
      const date = parseISODate(value);
      date.setDate(date.getDate() + days);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function daysBetween(from, to) {
      return Math.round((parseISODate(to) - parseISODate(from)) / 86400000);
    }

    function normalizeDateInput(value) {
      const trimmed = String(value || "").trim();
      if (!trimmed || trimmed === "-") return "";
      const match = trimmed.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
      if (!match) return "";
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(year, month - 1, day);
      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) return "";
      return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function reviewInfo(problem) {
      const record = getRecord(problem.id);
      const completedRounds = record.rounds.filter(Boolean).length;
      if (completedRounds === 0) {
        return { status: "not-started", text: "未开始", due: false, nextRound: 1 };
      }
      if (completedRounds >= ROUNDS.length) {
        return { status: "complete", text: "已完成", due: false, nextRound: ROUNDS.length };
      }
      const latestDate = record.dates[completedRounds - 1] || todayISO();
      const dueDate = addDays(latestDate, REVIEW_DELAYS[completedRounds - 1]);
      const diff = daysBetween(todayISO(), dueDate);
      const text = diff < 0 ? `逾期 ${Math.abs(diff)} 天` : diff === 0 ? "今天" : `${diff} 天后`;
      return { status: "reviewing", text, due: diff <= 0, dueDate, nextRound: completedRounds + 1 };
    }

    function difficultyClass(difficulty) {
      return difficulty === "Easy" ? "easy" : difficulty === "Medium" ? "medium" : "hard";
    }

    function difficultyText(difficulty) {
      return difficulty === "Easy" ? "简单" : difficulty === "Medium" ? "中等" : "困难";
    }

    function leetcodeUrl(slug) {
      return `https://leetcode.cn/problems/${slug}/`;
    }

    function render() {
      const query = searchEl.value.trim().toLowerCase();
      const categoryFilter = categoryEl.value;
      const statusFilter = statusEl.value;
      listEl.innerHTML = "";

      let visibleCount = 0;

      groups.forEach(([category, rawItems]) => {
        if (categoryFilter !== "all" && categoryFilter !== category) return;

        const categoryProblems = problems.filter((problem) => problem.category === category);
        const filtered = categoryProblems.filter((problem) => {
          const record = getRecord(problem.id);
          const completedRounds = record.rounds.filter(Boolean).length;
          const haystack = `${problem.id} ${problem.cn} ${problem.en} ${problem.category}`.toLowerCase();
          const matchesQuery = !query || haystack.includes(query);
          const matchesStatus =
            statusFilter === "all" ||
            (statusFilter === "not-started" && completedRounds === 0) ||
            (statusFilter === "started" && completedRounds > 0 && completedRounds < ROUNDS.length) ||
            (statusFilter === "due-today" && reviewInfo(problem).due) ||
            (statusFilter === "complete" && completedRounds === ROUNDS.length);
          return matchesQuery && matchesStatus;
        });

        if (!filtered.length) return;
        visibleCount += filtered.length;

        const groupDone = categoryProblems.filter((problem) => getRecord(problem.id).rounds.some(Boolean)).length;
        const section = document.createElement("section");
        section.className = "category";
        section.innerHTML = `

        `;

        const tbody = section.querySelector("tbody");
        const plan = todayPlan();
        const reviewProblemId = plan.review?.problem.id || "";
        const newProblemIds = new Set(plan.newProblems.map((problem) => problem.id));
        filtered.forEach((problem) => {
          const record = getRecord(problem.id);
          const info = reviewInfo(problem);
          const row = document.createElement("tr");
          row.className = reviewProblemId === problem.id ? "plan-review" : info.due ? "due-today" : newProblemIds.has(problem.id) ? "plan-new" : "";
          row.dataset.problemId = problem.id;
          row.innerHTML = `
            <td class="order">${problem.order}</td>
            <td class="problem">
              <a href="${leetcodeUrl(problem.slug)}" target="_blank" rel="noopener">
                <span class="number">${problem.id}</span>${problem.cn}
              </a>
              <div class="subtitle">${problem.en}</div>
            </td>
            <td><span class="difficulty ${difficultyClass(problem.difficulty)}">${difficultyText(problem.difficulty)}</span></td>
            <td class="checks">
              <div class="check-grid">
                ${ROUNDS.map((label, round) => `
                  <label class="date-cell" title="${label}">
                    <span>${label}</span>
                    <span class="date-picker-wrap ${record.dates[round] ? "has-date" : ""}">
                      <button class="date-display ${record.dates[round] ? "done" : ""}" type="button" data-round="${round}">${escapeAttr(record.dates[round] || "")}</button>
                      <input type="date" data-round="${round}" value="${escapeAttr(record.dates[round] || "")}">
                      <button class="clear-date" type="button" data-round="${round}" aria-label="清除${label}日期">×</button>
                    </span>
                  </label>
                `).join("")}
              </div>
            </td>
            <td class="next-review">${info.text}</td>
            <td><input class="note-input" type="text" placeholder="错因 / 模板 / 下次注意" value="${escapeAttr(record.note || "")}"></td>
          `;
          tbody.appendChild(row);
        });

        listEl.appendChild(section);
      });

      emptyEl.classList.toggle("hidden", visibleCount > 0);
      updateStats();
      renderReviewPanel();
    }

    function escapeAttr(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function updateStats() {
      const totalChecks = problems.length * ROUNDS.length;
      const checked = problems.reduce((sum, problem) => sum + getRecord(problem.id).rounds.filter(Boolean).length, 0);
      const started = problems.filter((problem) => getRecord(problem.id).rounds.some(Boolean)).length;
      document.querySelector("#totalDone").textContent = `${checked}/${totalChecks}`;
      document.querySelector("#problemDone").textContent = `已完成 ${started}/${problems.length} 题至少一遍`;
      document.querySelector("#progressBar").style.width = `${Math.round((checked / totalChecks) * 100)}%`;
    }

    function renderReviewPanel() {
      const dueProblems = problems
        .map((problem) => ({ problem, info: reviewInfo(problem) }))
        .filter((item) => item.info.due)
        .sort((a, b) => (a.info.dueDate || "").localeCompare(b.info.dueDate || "") || a.problem.order - b.problem.order);
      const plan = todayPlan(dueProblems);

      reviewPanel.classList.remove("hidden");
      reviewCount.textContent = plan.doneToday ? "今日完成" : dueProblems.length > 0 ? `待复习 ${dueProblems.length}` : "轻松日";
      reviewList.innerHTML = `
        <div class="plan-section">
          <h3>复习 1 道</h3>
          ${plan.review ? renderPlanItem(plan.review.problem, plan.review.info, "primary") : '<div class="review-item"><strong>暂无到期复习</strong><span>今天可以只做新题，保持节奏就好。</span></div>'}
        </div>
        <div class="plan-section">
          <h3>新题 2 到 3 道</h3>
          ${renderNewPlan(plan)}
        </div>
      `;
    }

    function todayPlan(dueProblems) {
      const due = dueProblems || problems
        .map((problem) => ({ problem, info: reviewInfo(problem) }))
        .filter((item) => item.info.due)
        .sort((a, b) => (a.info.dueDate || "").localeCompare(b.info.dueDate || "") || a.problem.order - b.problem.order);
      const dailyNew = dailyNewPlan();
      return { review: due[0] || null, ...dailyNew };
    }

    function loadDailyPlan() {
      try {
        const parsed = JSON.parse(localStorage.getItem(DAILY_PLAN_KEY) || "{}");
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveDailyPlan(plan) {
      localStorage.setItem(DAILY_PLAN_KEY, JSON.stringify(plan));
      scheduleAutoBackup();
    }

    function dailyNewPlan() {
      const today = todayISO();
      let plan = loadDailyPlan();
      const validIds = new Set(problems.map((problem) => problem.id));

      if (plan.date !== today || !Array.isArray(plan.newIds)) {
        const startedTodayIds = problems
          .filter((problem) => getRecord(problem.id).dates[0] === today)
          .slice(0, 3)
          .map((problem) => problem.id);
        const newIds = [
          ...startedTodayIds,
          ...problems
          .filter((problem) => !startedTodayIds.includes(problem.id) && !getRecord(problem.id).rounds.some(Boolean))
          .slice(0, 3)
          .map((problem) => problem.id)
        ].slice(0, 3);
        plan = { date: today, newIds };
        saveDailyPlan(plan);
      }

      const assignedProblems = plan.newIds
        .filter((id) => validIds.has(id))
        .map((id) => problems.find((problem) => problem.id === id))
        .filter(Boolean);
      const remainingProblems = assignedProblems.filter((problem) => !getRecord(problem.id).rounds.some(Boolean));
      const allNewDone = problems.every((problem) => getRecord(problem.id).rounds.some(Boolean));
      const doneToday = assignedProblems.length > 0 && remainingProblems.length === 0;

      return {
        assignedNewProblems: assignedProblems,
        newProblems: remainingProblems,
        doneToday,
        allNewDone
      };
    }

    function renderNewPlan(plan) {
      if (plan.newProblems.length > 0) {
        return `
          ${plan.newProblems.map((problem) => renderPlanItem(problem, reviewInfo(problem), "")).join("")}

        `;
      }
      if (plan.doneToday) {
        return '<div class="review-item primary"><strong>今日新题已完成</strong><span>这批题已进入明天独立重做；明天做出来后再勾第 2 次。</span></div>';
      }
      if (plan.allNewDone) {
        return '<div class="review-item"><strong>新题已清空</strong><span>Hot 100 新题全部至少做过一遍。</span></div>';
      }
      return '<div class="review-item"><strong>今日新题已完成</strong><span>明天会继续按顺序分配新题。</span></div>';
    }

    function scheduleTodayNewForTomorrow() {
      const plan = todayPlan();
      plan.assignedNewProblems.forEach((problem) => {
        const record = getRecord(problem.id);
        record.rounds[0] = true;
        record.dates[0] = todayISO();
        for (let index = 1; index < ROUNDS.length; index += 1) {
          record.rounds[index] = false;
          record.dates[index] = "";
        }
      });
      saveState();
      render();
    }

    function renderPlanItem(problem, info, extraClass) {
      const label = info.status === "not-started"
        ? `${problem.category} / 新题`
        : `${problem.category} / 第 ${info.nextRound} 次 / ${info.text}`;
      return `
        <a class="review-item ${extraClass}" href="${leetcodeUrl(problem.slug)}" target="_blank" rel="noopener">
          <strong>${problem.order}. ${problem.cn}</strong>
          <span>${label}</span>
        </a>
      `;
    }

    function openKnownDialog() {
      knownSelection.clear();
      problems.forEach((problem) => {
        const record = getRecord(problem.id);
        if (record.rounds[0] && record.rounds[1]) knownSelection.add(problem.id);
      });
      knownSearch.value = "";
      renderKnownList();
      knownDialog.showModal();
    }

    function renderKnownList() {
      const query = knownSearch.value.trim().toLowerCase();
      const visibleGroups = groups.map(([category]) => {
        const visible = problems.filter((problem) => {
          const haystack = `${problem.id} ${problem.cn} ${problem.en} ${problem.category}`.toLowerCase();
          return problem.category === category && (!query || haystack.includes(query));
        });
        return { category, visible };
      }).filter((group) => group.visible.length);

      knownList.innerHTML = visibleGroups.map(({ category, visible }) => `
        <section class="known-group">
          <h3>${category}</h3>
          <div class="known-grid">
            ${visible.map((problem) => `
              <label class="known-option">
                <input type="checkbox" value="${problem.id}" ${knownSelection.has(problem.id) ? "checked" : ""}>
                <span>
                  <strong>${problem.order}. ${problem.id} ${problem.cn}</strong>
                  <span>${problem.en} / ${difficultyText(problem.difficulty)}</span>
                </span>
              </label>
            `).join("")}
          </div>
        </section>
      `).join("") || '<div class="empty">没有匹配的题目。</div>';
      updateKnownSelectedCount();
    }

    function updateKnownSelectedCount() {
      knownSelectedCount.textContent = `已选择 ${knownSelection.size} 题`;
    }

    function applyKnownProgress() {
      knownSelection.forEach((id) => {
        const record = getRecord(id);
        record.rounds[0] = true;
        record.rounds[1] = true;
        record.dates[0] = record.dates[0] || todayISO();
        record.dates[1] = todayISO();
      });
      saveState();
      render();
      knownDialog.close();
    }

    function exportProgress() {
      const payload = backupPayload();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `leetcode-hot100-progress-${todayISO()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function backupPayload() {
      return {
        version: 1,
        exportedAt: new Date().toISOString(),
        progress: state,
        dailyPlan: loadDailyPlan()
      };
    }

    function importProgressFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(reader.result);
          const importedProgress = payload.progress || payload;
          if (!importedProgress || typeof importedProgress !== "object" || Array.isArray(importedProgress)) {
            throw new Error("invalid progress");
          }
          state = importedProgress;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          if (payload.dailyPlan && typeof payload.dailyPlan === "object") {
            localStorage.setItem(DAILY_PLAN_KEY, JSON.stringify(payload.dailyPlan));
          }
          render();
          alert("进度已导入。");
        } catch {
          alert("导入失败：请选择由本页面导出的进度 JSON 文件。");
        } finally {
          progressFileInput.value = "";
        }
      };
      reader.readAsText(file);
    }

    function openBackupDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(BACKUP_DB_NAME, 1);
        request.onupgradeneeded = () => request.result.createObjectStore(BACKUP_STORE_NAME);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveBackupHandle(handle) {
      const db = await openBackupDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORE_NAME, "readwrite");
        tx.objectStore(BACKUP_STORE_NAME).put(handle, BACKUP_HANDLE_KEY);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      db.close();
    }

    async function loadBackupHandle() {
      const db = await openBackupDb();
      const handle = await new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORE_NAME, "readonly");
        const request = tx.objectStore(BACKUP_STORE_NAME).get(BACKUP_HANDLE_KEY);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
      db.close();
      return handle;
    }

    async function ensureBackupPermission(handle) {
      if (!handle) return false;
      if (await handle.queryPermission({ mode: "readwrite" }) === "granted") return true;
      return await handle.requestPermission({ mode: "readwrite" }) === "granted";
    }

    async function bindLocalBackup() {
      if (!window.showSaveFilePicker || !window.indexedDB) {
        alert("当前浏览器不支持自动写入本地备份。建议使用新版 Edge 或 Chrome。");
        return;
      }
      try {
        backupFileHandle = await window.showSaveFilePicker({
          suggestedName: `leetcode-hot100-progress-${todayISO()}.json`,
          types: [{
            description: "JSON 进度备份",
            accept: { "application/json": [".json"] }
          }]
        });
        await saveBackupHandle(backupFileHandle);
        await writeAutoBackup();
        bindBackupBtn.textContent = "本地备份已绑定";
        alert("已绑定本地备份文件。之后每次修改进度会自动保存到这个 JSON 文件。");
      } catch (error) {
        if (error && error.name !== "AbortError") {
          alert("绑定失败：浏览器没有授予文件写入权限。");
        }
      }
    }

    function scheduleAutoBackup() {
      if (!backupFileHandle) return;
      clearTimeout(backupTimer);
      backupTimer = setTimeout(() => {
        writeAutoBackup().catch(() => {
          bindBackupBtn.textContent = "备份需重新绑定";
        });
      }, 350);
    }

    async function writeAutoBackup() {
      if (!backupFileHandle) return;
      if (!(await ensureBackupPermission(backupFileHandle))) {
        bindBackupBtn.textContent = "备份需授权";
        return;
      }
      const writable = await backupFileHandle.createWritable();
      await writable.write(JSON.stringify(backupPayload(), null, 2));
      await writable.close();
      bindBackupBtn.textContent = "本地备份已绑定";
    }

    async function initLocalBackup() {
      if (!window.indexedDB) return;
      try {
        backupFileHandle = await loadBackupHandle();
        if (backupFileHandle) {
          bindBackupBtn.textContent = "本地备份已绑定";
        }
      } catch {
        backupFileHandle = null;
      }
    }

    function setRoundDate(row, round, value) {
      const record = getRecord(row.dataset.problemId);
      if (value) {
        for (let index = 0; index <= round; index += 1) {
          record.rounds[index] = true;
          if (!record.dates[index]) record.dates[index] = value;
        }
        record.dates[round] = value;
      } else {
        for (let index = round; index < ROUNDS.length; index += 1) {
          record.rounds[index] = false;
          record.dates[index] = "";
        }
      }
      saveState();
      render();
    }

    listEl.addEventListener("click", (event) => {
      const clearButton = event.target.closest("button.clear-date[data-round]");
      if (clearButton) {
        event.preventDefault();
        const row = clearButton.closest("tr");
        setRoundDate(row, Number(clearButton.dataset.round), "");
        return;
      }

      const displayButton = event.target.closest("button.date-display[data-round]");
      if (!displayButton) return;
      event.preventDefault();
      const input = displayButton.parentElement.querySelector('input[type="date"]');
      if (input && input.showPicker) {
        input.showPicker();
      } else if (input) {
        input.focus();
        input.click();
      }
    });

    listEl.addEventListener("change", (event) => {
      const dateInput = event.target.closest('input[type="date"][data-round]');
      if (!dateInput) return;
      const row = dateInput.closest("tr");
      const round = Number(dateInput.dataset.round);
      setRoundDate(row, round, normalizeDateInput(dateInput.value));
    });

    listEl.addEventListener("input", (event) => {
      if (!event.target.classList.contains("note-input")) return;
      const row = event.target.closest("tr");
      getRecord(row.dataset.problemId).note = event.target.value;
      saveState();
    });

    reviewList.addEventListener("click", (event) => {
      const button = event.target.closest('button[data-action="redo-tomorrow"]');
      if (!button) return;
      scheduleTodayNewForTomorrow();
    });

    searchEl.addEventListener("input", render);
    categoryEl.addEventListener("change", render);
    statusEl.addEventListener("change", render);
    importKnownBtn.addEventListener("click", openKnownDialog);
    exportProgressBtn.addEventListener("click", exportProgress);
    importProgressBtn.addEventListener("click", () => progressFileInput.click());
    bindBackupBtn.addEventListener("click", bindLocalBackup);
    progressFileInput.addEventListener("change", () => {
      const file = progressFileInput.files && progressFileInput.files[0];
      if (file) importProgressFile(file);
    });
    closeKnownBtn.addEventListener("click", () => knownDialog.close());
    knownSearch.addEventListener("input", renderKnownList);
    knownList.addEventListener("change", (event) => {
      const checkbox = event.target.closest('input[type="checkbox"]');
      if (!checkbox) return;
      if (checkbox.checked) {
        knownSelection.add(checkbox.value);
      } else {
        knownSelection.delete(checkbox.value);
      }
      updateKnownSelectedCount();
    });
    selectVisibleBtn.addEventListener("click", () => {
      knownList.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
        checkbox.checked = true;
        knownSelection.add(checkbox.value);
      });
      updateKnownSelectedCount();
    });
    selectStartedBtn.addEventListener("click", () => {
      problems.forEach((problem) => {
        if (getRecord(problem.id).rounds.some(Boolean)) knownSelection.add(problem.id);
      });
      renderKnownList();
    });
    clearSelectionBtn.addEventListener("click", () => {
      knownSelection.clear();
      renderKnownList();
    });
    applyKnownBtn.addEventListener("click", applyKnownProgress);

    resetBtn.addEventListener("click", () => resetDialog.showModal());
    closeResetBtn.addEventListener("click", () => resetDialog.close());
    cancelResetBtn.addEventListener("click", () => resetDialog.close());
    confirmResetBtn.addEventListener("click", () => {
      state = {};
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(DAILY_PLAN_KEY);
      resetDialog.close();
      render();
    });

    initLocalBackup();
    render();
  </script>
</body>
</html>
